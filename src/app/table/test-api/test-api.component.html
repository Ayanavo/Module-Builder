<div class="m-3">
    <div *ngIf="!userListing$ as listingloaded" class="d-flex justify-content-center alight-item-center">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-end mb-3">
        <div class="input-group col-md-2 text-right">
            <span class="input-group-text" id="basic-addon1"> <i-bs name="search" width="25" height="25"> </i-bs></span>
            <input type="search" class="form-control" placeholder="Search..." [formControl]="search" />
        </div>
        <div style="width: 10px"></div>
    </div>
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col"></th>
                <th scope="col">#</th>
                <th scope="col">Username</th>
                <th scope="col">Email</th>
                <th scope="col">Name</th>
                <th scope="col">Phone</th>
                <th scope="col">Website</th>
            </tr>
        </thead>
        <tbody class="table-group-divider">
            <tr *ngFor="let obj of userListing$ | async; index as i">
                <th scope="row">{{ i + 1 }}</th>
                <td><input class="form-check-input" type="checkbox" [id]="i" /></td>
                <td>{{ obj.username }}</td>
                <td>{{ obj.email }}</td>
                <td>{{ obj.name }}</td>
                <td>{{ obj.phone }}</td>
                <td>
                    <a [href]="obj.website.link" target="_blank"> {{ obj.website.refname }}</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
