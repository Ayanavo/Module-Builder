<div class="mb-3 row" [formGroup]="FormGroup">
    <label class="col-form-label , text-truncate, col-4" [ngClass]="{ 'required-label': ControlAccess['validators']?.['required'] }" for="flexSwitchCheckDefault">{{ ControlAccess["label"] }}</label>

    <div class="form-check form-switch col-8">
        <input [formControlName]="ControlAccess['id']" class="form-check-input" type="checkbox" id="flexSwitchCheckDefault" />
        <error-msg [control]="ControlAccess['id']"></error-msg>
    </div>
</div>
